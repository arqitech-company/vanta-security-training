<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arqitech Security Policy Training</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');

:root {
  --charcoal: #101010;
  --gray-blue: #1E1F22;
  --white: #FFFFFF;
  --silver: #BFC4CA;
  --gold: #C89A3F;
  --gold-light: #FFF1B0;
  --green: #4FA177;
  --dark-gradient-end: #3A3C42;
  --off-white: #F5F0E8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', Arial, sans-serif;
  background: var(--charcoal);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Progress bar */
.progress-bar-container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--gray-blue);
  z-index: 1000;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.5s ease;
  width: 0%;
}

/* Header */
.header {
  position: fixed;
  top: 4px;
  left: 0;
  right: 0;
  height: 56px;
  background: var(--gray-blue);
  border-bottom: 1px solid rgba(191, 196, 202, 0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  z-index: 999;
}

.header-logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1.5px;
}

.header-progress-text {
  font-size: 13px;
  color: var(--silver);
}

.header-progress-text span {
  color: var(--gold);
  font-weight: 600;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: 60px;
  left: 0;
  bottom: 0;
  width: 280px;
  background: var(--gray-blue);
  border-right: 1px solid rgba(191, 196, 202, 0.1);
  overflow-y: auto;
  padding: 16px 0;
  z-index: 998;
  transition: transform 0.3s ease;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

.sidebar-section {
  padding: 8px 20px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
  color: var(--silver);
  gap: 10px;
  border-left: 3px solid transparent;
}

.sidebar-item:hover {
  background: rgba(200, 154, 63, 0.08);
  color: var(--white);
}

.sidebar-item.active {
  background: rgba(200, 154, 63, 0.12);
  color: var(--gold);
  border-left-color: var(--gold);
}

.sidebar-item.completed .step-indicator {
  background: var(--green);
  border-color: var(--green);
}

.sidebar-item.locked {
  opacity: 0.4;
  cursor: not-allowed;
}

.step-indicator {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--silver);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  flex-shrink: 0;
  transition: all 0.3s;
}

.step-indicator.active-indicator {
  border-color: var(--gold);
  color: var(--gold);
}

.step-indicator svg {
  width: 12px;
  height: 12px;
}

/* Main content */
.main {
  margin-left: 280px;
  margin-top: 60px;
  min-height: calc(100vh - 60px);
  padding: 48px 64px;
  max-width: 900px;
  transition: opacity 0.25s ease;
}

.main.fading-out {
  opacity: 0;
}

.main.fading-in {
  opacity: 0;
}

/* Step screens */
.step-screen {
  display: none;
  animation: fadeIn 0.4s ease;
}

.step-screen.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Typography */
h1 {
  font-size: 32px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
  line-height: 1.3;
}

h1 .gold { color: var(--gold); }

.subtitle {
  font-size: 15px;
  color: var(--silver);
  margin-bottom: 32px;
  line-height: 1.6;
}

h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--gold);
  margin-top: 32px;
  margin-bottom: 12px;
}

h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
  margin-top: 24px;
  margin-bottom: 8px;
}

.content-text {
  font-size: 15px;
  line-height: 1.75;
  color: rgba(255, 255, 255, 0.85);
  margin-bottom: 16px;
}

.content-text strong {
  color: var(--white);
  font-weight: 600;
}

/* Policy badge */
.policy-badge {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  background: rgba(200, 154, 63, 0.12);
  border: 1px solid rgba(200, 154, 63, 0.3);
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 16px;
}

/* Checklist */
.checklist {
  background: rgba(30, 31, 34, 0.8);
  border: 1px solid rgba(191, 196, 202, 0.15);
  border-radius: 12px;
  padding: 24px;
  margin-top: 24px;
  margin-bottom: 24px;
}

.checklist-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 16px;
  letter-spacing: 0.5px;
}

.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(191, 196, 202, 0.08);
  cursor: pointer;
  transition: opacity 0.2s;
}

.checklist-item:last-child {
  border-bottom: none;
}

.checklist-item:hover {
  opacity: 0.9;
}

.check-box {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  border: 2px solid var(--silver);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-top: 1px;
}

.check-box.checked {
  background: var(--green);
  border-color: var(--green);
}

.check-box svg {
  width: 12px;
  height: 12px;
  opacity: 0;
  transition: opacity 0.2s;
}

.check-box.checked svg {
  opacity: 1;
}

.checklist-item label {
  font-size: 14px;
  line-height: 1.55;
  color: rgba(255, 255, 255, 0.8);
  cursor: pointer;
}

.checklist-item.checked-item label {
  color: rgba(255, 255, 255, 0.5);
  text-decoration: line-through;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  font-family: inherit;
}

.btn-primary {
  background: linear-gradient(135deg, var(--gold), #D4A94F);
  color: var(--charcoal);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(200, 154, 63, 0.3);
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--silver);
  color: var(--silver);
}

.btn-secondary:hover {
  border-color: var(--white);
  color: var(--white);
}

.btn-row {
  display: flex;
  gap: 12px;
  margin-top: 32px;
  align-items: center;
}

/* Scenario cards */
.scenario-card {
  background: rgba(30, 31, 34, 0.8);
  border: 1px solid rgba(191, 196, 202, 0.15);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 20px;
}

.scenario-number {
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.scenario-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 12px;
}

.scenario-text {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 16px;
}

.scenario-questions {
  font-size: 14px;
  color: var(--silver);
  line-height: 1.7;
  margin-bottom: 16px;
  padding-left: 4px;
}

.scenario-questions div {
  margin-bottom: 4px;
}

.reveal-btn {
  background: rgba(200, 154, 63, 0.1);
  border: 1px solid rgba(200, 154, 63, 0.3);
  color: var(--gold);
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.2s;
}

.reveal-btn:hover {
  background: rgba(200, 154, 63, 0.2);
}

.scenario-answer {
  display: none;
  margin-top: 16px;
  padding: 16px;
  background: rgba(79, 161, 119, 0.08);
  border-left: 3px solid var(--green);
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  line-height: 1.7;
  color: rgba(255, 255, 255, 0.85);
}

.scenario-answer.revealed {
  display: block;
  animation: fadeIn 0.3s ease;
}

.scenario-policies {
  margin-top: 12px;
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
}

.scenario-check {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  cursor: pointer;
}

/* Video step */
.video-placeholder {
  background: linear-gradient(135deg, var(--gray-blue), var(--dark-gradient-end));
  border: 1px solid rgba(191, 196, 202, 0.15);
  border-radius: 12px;
  padding: 48px;
  text-align: center;
  margin: 24px 0;
}

.video-placeholder svg {
  width: 64px;
  height: 64px;
  color: var(--gold);
  margin-bottom: 16px;
}

/* Certificate */
.certificate-container {
  text-align: center;
  padding: 40px 0;
}

.certificate {
  background: var(--white);
  color: var(--charcoal);
  border-radius: 8px;
  padding: 60px 48px;
  max-width: 640px;
  margin: 0 auto 32px;
  position: relative;
  overflow: hidden;
}

.certificate::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}

.cert-logo {
  font-size: 24px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.cert-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--charcoal);
  margin-bottom: 4px;
}

.cert-subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 32px;
}

.cert-name-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 8px;
}

.cert-name-input {
  font-size: 28px;
  font-weight: 600;
  color: var(--charcoal);
  border: none;
  border-bottom: 2px solid var(--gold);
  text-align: center;
  width: 100%;
  max-width: 400px;
  padding: 8px 0;
  background: transparent;
  font-family: inherit;
  outline: none;
}

.cert-name-input::placeholder {
  color: #ccc;
}

.cert-details {
  margin-top: 32px;
  font-size: 14px;
  color: #555;
  line-height: 1.8;
}

.cert-date {
  font-weight: 600;
  color: var(--charcoal);
}

.cert-footer {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #999;
}

/* Confetti */
.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 10000;
}

.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  opacity: 0;
}

/* Name input modal overlay */
.name-input-section {
  margin: 24px 0;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 32px 20px; }
}

/* Policy content sections */
.policy-section {
  margin-bottom: 20px;
}

.highlight-box {
  background: rgba(200, 154, 63, 0.08);
  border: 1px solid rgba(200, 154, 63, 0.2);
  border-radius: 8px;
  padding: 16px 20px;
  margin: 16px 0;
  font-size: 14px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.85);
}

/* Welcome stats */
.stats-row {
  display: flex;
  gap: 16px;
  margin: 24px 0;
}

.stat-card {
  flex: 1;
  background: rgba(30, 31, 34, 0.8);
  border: 1px solid rgba(191, 196, 202, 0.15);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
}

.stat-number {
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
}

.stat-label {
  font-size: 12px;
  color: var(--silver);
  margin-top: 4px;
}

/* Scroll */
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
</style>
</head>

const PASS_HASH = '8809ee586aed437d1254d27be06fdda63eec58540523d684d8d203063e9b9914';

async function hashPassword(pw) {
  const encoded = new TextEncoder().encode(pw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  const hashed = await hashPassword(input);
  if (hashed === PASS_HASH) {
    document.getElementById('passwordGate').style.opacity = '0';
    document.getElementById('passwordGate').style.transition = 'opacity 0.3s ease';

      document.getElementById('passwordGate').style.display = 'none';

      document.getElementById('appShell2').style.display = '';
      document.getElementById('sidebar').style.display = '';

    document.getElementById('passwordError').style.opacity = '1';
    document.getElementById('passwordInput').value = '';
    setTimeout(() => { document.getElementById('passwordError').style.opacity = '0'; }, 2000);
  }
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '';
  let currentSection = '';

  STEPS.forEach((step, idx) => {
    if (step.section !== currentSection) {
      currentSection = step.section;
      html += `<div class="sidebar-section">${currentSection}</div>`;
    }

    const isCompleted = state.completedSteps.has(idx);
    const isActive = idx === state.currentStep;
    const isLocked = idx > 0 && !state.completedSteps.has(idx - 1) && !state.completedSteps.has(idx) && idx !== state.currentStep;

    let indicatorContent = '';
    if (isCompleted) {
      indicatorContent = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else {
      indicatorContent = idx + 1;
    }

    const classes = [
      'sidebar-item',
      isActive ? 'active' : '',
      isCompleted ? 'completed' : '',
      isLocked ? 'locked' : ''
    ].filter(Boolean).join(' ');

    const indicatorClasses = `step-indicator ${isActive ? 'active-indicator' : ''}`;

    html += `<div class="${classes}" onclick="goToStep(${idx})" data-step="${idx}">
      <div class="${indicatorClasses}">${indicatorContent}</div>
      <span>${step.title}</span>
    </div>`;
  });

  sidebar.innerHTML = html;
}

function renderMainContent(scrollToTop = true) {
  const main = document.getElementById('mainContent');

  if (scrollToTop) {
    // Crossfade: fade out, swap content, scroll, fade in
    main.classList.add('fading-out');
    setTimeout(() => {
      swapMainContent(main);
      window.scrollTo(0, 0);
      main.classList.remove('fading-out');
      main.classList.add('fading-in');
      // Force reflow so the browser registers opacity:0 before transitioning
      void main.offsetHeight;
      main.classList.remove('fading-in');
    }, 250);
  } else {
    swapMainContent(main);
  }
  updateProgress();
}

function swapMainContent(main) {
  const step = STEPS[state.currentStep];
  switch (step.type) {
    case 'welcome': main.innerHTML = renderWelcome(); break;
    case 'video': main.innerHTML = renderVideo(); break;
    case 'policy': main.innerHTML = renderPolicy(step); break;
    case 'quiz': main.innerHTML = renderQuiz(); break;
    case 'certificate': main.innerHTML = renderCertificate(); break;
  }
}

      <button class="btn btn-secondary" onclick="goToStep(state.currentStep - 1)">← Back</button>
      <button class="btn btn-primary" onclick="completeAndNext()" ${!isComplete ? 'disabled' : ''} id="videoNextBtn">Continue →</button>
    </div>
  </div>`;
}

function renderPolicy(step) {
  const idx = state.currentStep;
  const stepId = step.id;
  if (!state.checklists[stepId]) state.checklists[stepId] = new Set();

  const allChecked = state.checklists[stepId].size === step.checklist.length;

  let checklistHtml = step.checklist.map((item, i) => {
    const isChecked = state.checklists[stepId].has(i);
    return `<div class="checklist-item ${isChecked ? 'checked-item' : ''}" onclick="toggleCheck('${stepId}', ${i})">
      <div class="check-box ${isChecked ? 'checked' : ''}">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <label>${item}</label>
    </div>`;
  }).join('');

  return `<div class="step-screen active">
    <div class="policy-badge">${step.badge}</div>
    <h1>${step.title}</h1>
    <p class="subtitle">${step.intro}</p>
    ${step.content}
    <div class="checklist">
      <div class="checklist-title">What You Need to Know</div>
      ${checklistHtml}
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goToStep(state.currentStep - 1)">← Back</button>
      <button class="btn btn-primary" onclick="completeAndNext()" ${!allChecked ? 'disabled' : ''} id="policyNextBtn">
        ${idx < STEPS.length - 1 ? 'Continue →' : 'Finish'}
      </button>
      <span style="font-size: 12px; color: var(--silver); margin-left: 8px;" id="checkHint">
        ${!allChecked ? `${state.checklists[stepId].size}/${step.checklist.length} checked` : 'All confirmed!'}
      </span>
    </div>
  </div>`;
}

function renderQuiz() {
  const allRevealed = state.scenariosRevealed.size === 10;
  const allChecked = state.scenariosChecked.size === 10;

  let html = `<div class="step-screen active">
    <h1>Real-World <span class="gold">Scenarios</span></h1>
    <p class="subtitle">You've made it through all 15 policies. Now let's see if it stuck. Think through each scenario before revealing the answer.</p>`;

  SCENARIOS.forEach((s, i) => {
    const isRevealed = state.scenariosRevealed.has(i);
    const isChecked = state.scenariosChecked.has(i);

    html += `<div class="scenario-card">
      <div class="scenario-number">Scenario ${i + 1}</div>
      <div class="scenario-title">${s.title}</div>
      <div class="scenario-text">${s.text}</div>
      <div class="scenario-questions">
        ${s.questions.map(q => `<div>• ${q}</div>`).join('')}
      </div>
      ${!isRevealed ?
        `<button class="reveal-btn" onclick="revealScenario(${i})">Reveal Answer</button>` :
        `<div class="scenario-answer revealed">
          ${s.answer}
          <div class="scenario-policies">Policies: ${s.policies}</div>
        </div>
        <div class="scenario-check" onclick="toggleScenarioCheck(${i})">
          <div class="check-box ${isChecked ? 'checked' : ''}">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <label style="font-size: 13px; color: var(--silver); cursor: pointer;">I understand this scenario</label>
        </div>`
      }
    </div>`;
  });

  html += `<div class="btn-row">
    <button class="btn btn-secondary" onclick="goToStep(state.currentStep - 1)">← Back</button>
    <button class="btn btn-primary" onclick="completeAndNext()" ${!allChecked ? 'disabled' : ''} id="quizNextBtn">
      Complete Training →
    </button>
    <span style="font-size: 12px; color: var(--silver); margin-left: 8px;">
      ${!allChecked ? `${state.scenariosChecked.size}/10 scenarios confirmed` : 'All confirmed!'}
    </span>
  </div></div>`;

  return html;
}

function renderCertificate() {
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  return `<div class="step-screen active">
    <div class="certificate-container">
      <h1 style="margin-bottom: 24px;">Training <span class="gold">Complete</span></h1>
      <p class="content-text" style="text-align: center; margin-bottom: 32px;">Enter your name below and download your certificate of completion.</p>

      <div class="certificate" id="certificateEl">
        <div class="cert-logo">ARQITECH</div>
        <div class="cert-title">Certificate of Completion</div>
        <div class="cert-subtitle">SOC 2 Security Policy Training</div>

        <div class="cert-name-label">Awarded To</div>
        <input class="cert-name-input" type="text" id="certName" placeholder="Enter your full name" oninput="state.employeeName = this.value; updateDownloadBtn();" value="${state.employeeName}">

        <div class="cert-details">
          Has successfully reviewed all 15 Arqitech security policies,<br>
          completed the companion training guides, and demonstrated<br>
          comprehension through the real-world scenarios assessment.
          <br><br>
          <span class="cert-date">${dateStr}</span>
        </div>

        <div class="cert-footer">
          <span>Arqitech, Inc.</span>
          <span>SOC 2 Compliance Training Program</span>
        </div>
      </div>

      <button class="btn btn-primary" id="downloadBtn" onclick="downloadCertificate()" ${!state.employeeName ? 'disabled' : ''}>
        Download Certificate (PDF)
      </button>
    </div>
  </div>`;
}

// ============================================================
// INTERACTIONS
// ============================================================

function goToStep(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  // Allow going to any completed step or the next uncompleted one
  const maxAllowed = Math.max(...[...state.completedSteps], -1) + 1;
  if (idx > maxAllowed && !state.completedSteps.has(idx)) return;

  state.currentStep = idx;
  renderSidebar();
  renderMainContent();
}

function completeAndNext() {
  state.completedSteps.add(state.currentStep);
  if (state.currentStep < STEPS.length - 1) {
    state.currentStep++;
  }
  renderSidebar();
  renderMainContent();

  // Confetti on certificate step
  if (STEPS[state.currentStep].type === 'certificate') {
    setTimeout(launchConfetti, 300);
  }
}

function toggleVideoCheck() {
  if (state.completedSteps.has(1)) {
    state.completedSteps.delete(1);
  } else {
    state.completedSteps.add(1);
  }
  // Targeted update: toggle the checkbox and button without re-rendering
  const checkBox = document.querySelector('.check-box');
  const checkItem = document.querySelector('.checklist-item');
  const nextBtn = document.getElementById('videoNextBtn');
  const isComplete = state.completedSteps.has(1);
  if (checkBox) checkBox.className = isComplete ? 'check-box checked' : 'check-box';
  if (checkItem) checkItem.className = isComplete ? 'checklist-item checked-item' : 'checklist-item';
  if (nextBtn) nextBtn.disabled = !isComplete;
  renderSidebar();
  updateProgress();
}

function toggleCheck(stepId, idx) {
  if (!state.checklists[stepId]) state.checklists[stepId] = new Set();
  if (state.checklists[stepId].has(idx)) {
    state.checklists[stepId].delete(idx);
  } else {
    state.checklists[stepId].add(idx);
  }

  // Targeted update: just toggle the clicked checkbox
  const items = document.querySelectorAll('.checklist-item');
  const item = items[idx];
  if (item) {
    const box = item.querySelector('.check-box');
    const isChecked = state.checklists[stepId].has(idx);
    box.className = isChecked ? 'check-box checked' : 'check-box';
    item.className = isChecked ? 'checklist-item checked-item' : 'checklist-item';
  }

  // Update the continue button and hint
  const step = STEPS[state.currentStep];
  const allChecked = state.checklists[stepId].size === step.checklist.length;
  const nextBtn = document.getElementById('policyNextBtn');
  const hint = document.getElementById('checkHint');
  if (nextBtn) nextBtn.disabled = !allChecked;
  if (hint) hint.textContent = allChecked ? 'All confirmed!' : `${state.checklists[stepId].size}/${step.checklist.length} checked`;
}

function revealScenario(idx) {
  state.scenariosRevealed.add(idx);
  // Targeted update: replace the reveal button with the answer
  const cards = document.querySelectorAll('.scenario-card');
  const card = cards[idx];
  if (card) {
    const s = SCENARIOS[idx];
    const btn = card.querySelector('.reveal-btn');
    if (btn) {
      const answerHtml = `<div class="scenario-answer revealed">
        ${s.answer}
        <div class="scenario-policies">Policies: ${s.policies}</div>
      </div>
      <div class="scenario-check" onclick="toggleScenarioCheck(${idx})">
        <div class="check-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <label style="font-size: 13px; color: var(--silver); cursor: pointer;">I understand this scenario</label>
      </div>`;
      btn.remove();
      card.insertAdjacentHTML('beforeend', answerHtml);
    }
  }
}

function toggleScenarioCheck(idx) {
  if (state.scenariosChecked.has(idx)) {
    state.scenariosChecked.delete(idx);
  } else {
    state.scenariosChecked.add(idx);
  }

  // Targeted update: toggle the scenario checkbox
  const cards = document.querySelectorAll('.scenario-card');
  const card = cards[idx];
  if (card) {
    const box = card.querySelector('.scenario-check .check-box');
    const isChecked = state.scenariosChecked.has(idx);
    if (box) box.className = isChecked ? 'check-box checked' : 'check-box';
  }

  // Update the quiz continue button
  const allChecked = state.scenariosChecked.size === 10;
  const nextBtn = document.getElementById('quizNextBtn');
  if (nextBtn) nextBtn.disabled = !allChecked;
  const hint = nextBtn ? nextBtn.parentElement.querySelector('span') : null;
  if (hint) hint.textContent = allChecked ? 'All confirmed!' : `${state.scenariosChecked.size}/10 scenarios confirmed`;
}

function updateProgress() {
  const total = STEPS.length;
  const completed = state.completedSteps.size;
  const pct = (completed / total) * 100;

  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('completedCount').textContent = completed;
}

function updateDownloadBtn() {
  const btn = document.getElementById('downloadBtn');
  if (btn) btn.disabled = !state.employeeName.trim();
}

// ============================================================
// CONFETTI
// ============================================================

function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const colors = ['#C89A3F', '#FFF1B0', '#4FA177', '#BFC4CA', '#FFFFFF'];

  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 4) + 'px';
    piece.style.height = (Math.random() * 8 + 4) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animation = `confettiFall ${Math.random() * 2 + 1.5}s ease-out ${Math.random() * 0.5}s forwards`;
    container.appendChild(piece);
  }

  // Add animation dynamically
  if (!document.getElementById('confetti-style')) {
    const style = document.createElement('style');
    style.id = 'confetti-style';
    style.textContent = `
      @keyframes confettiFall {
        0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
        100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
      }
    `;
    document.head.appendChild(style);
  }

  setTimeout(() => container.remove(), 4000);
}

// ============================================================
// INIT
// ============================================================

renderSidebar();
renderMainContent();
</script>
</body>
</html>
